media: assets/images

content:
  - name: posts
    label: Blog posts
    type: collection
    path: _posts
    filename: "{year}-{month}-{day}-{fields.title}.md"
    view:
      fields: [title, date]
      primary: title
      sort: [date]
      default:
        sort: date
        order: desc
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: date, label: Date, type: date, required: true }
      - { name: body, label: Body, type: rich-text }

  - name: projects
    label: Projects
    type: collection
    path: _projects
    filename: "{fields.title}.md"
    view:
      fields: [title, status, order]
      primary: title
      sort: [order]
      default:
        sort: order
        order: asc
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: description, label: Description, type: text, required: true }
      - name: status
        label: Status
        type: select
        options:
          values: [active, growing, idea, archived]
      - { name: link, label: "Link (optional)", type: string, required: false }
      - { name: order, label: Order, type: number, default: 1 }

  - name: reading
    label: Reading
    type: collection
    path: _reading
    filename: "{fields.title}.md"
    view:
      fields: [title, author, status]
      primary: title
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: author, label: Author, type: string }
      - name: status
        label: Status
        type: select
        options:
          values: [reading, finished, want-to-read]
      - { name: body, label: Notes, type: rich-text }

  - name: home
    label: Home page
    type: file
    path: index.html
    fields:
      - { name: hero_title, label: Hero title, type: string }
      - { name: hero_subtitle, label: Hero subtitle, type: string }
      - { name: intro, label: "Intro paragraph 1", type: text }
      - { name: intro2, label: "Intro paragraph 2", type: text }

  - name: about
    label: About page
    type: file
    path: about.md
    fields:
      - { name: title, label: Title, type: string }
      - { name: body, label: Body, type: rich-text }
