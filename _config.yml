title: Nick Fraser
description: "Personal projects, places, science stories, and things I'm learning."

# Update this once your site is live (e.g. https://yourusername.github.io)
url: "https://nickfrasernz.github.io"
baseurl: ""

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Blog posts will live at /blog/2026/06/15/post-title/
permalink: /blog/:year/:month/:day/:title/

collections:
  projects:
    output: false
  reading:
    output: false

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
